    <path d="M8 106C52 34 110 30 152 100C116 178 50 178 8 106Z" fill="#EEF3F6" stroke="#A7B4BE" stroke-width="3" />
    <path d="M36 112L82 54L132 86L116 142L62 150L36 112Z" stroke="#1F2933" stroke-width="5" stroke-linejoin="round" />
    <path d="M28 196C76 224 136 212 172 166" stroke="#A9B5BE" stroke-width="3" stroke-dasharray="8 8" />
    <path d="M16 40C70 58 125 48 164 10" stroke="#A9B5BE" stroke-width="3" stroke-dasharray="8 8" />
    <g fill="#1F2933">
