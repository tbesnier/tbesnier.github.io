<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kendall shape space preview</title>
  <desc id="desc">Landmark configurations are centered and normalized onto a pre-shape sphere, then rotations are quotiented out to form shape space.</desc>

  <defs>
    <linearGradient id="background" x1="70" y1="52" x2="1120" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" />
      <stop offset="1" stop-color="#DDE4EA" />
    </linearGradient>
    <linearGradient id="panel" x1="98" y1="96" x2="1098" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#EEF3F6" />
    </linearGradient>
    <linearGradient id="sphere" x1="560" y1="200" x2="850" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#D7E0E6" />
    </linearGradient>
    <filter id="soft-shadow" x="70" y="75" width="1060" height="600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1E2933" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="750" rx="24" fill="url(#background)" />
  <rect x="100" y="96" width="1000" height="558" rx="18" fill="url(#panel)" stroke="#C2CCD4" filter="url(#soft-shadow)" />

  <text x="150" y="158" fill="#1F2933" font-size="38" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Kendall shape space</text>
  <text x="151" y="194" fill="#52616B" font-size="21" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">remove translation, scale, and rotation before measuring shape</text>

  <g transform="translate(150 258)">
    <text x="0" y="-34" fill="#34414A" font-size="20" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">landmarks</text>
    <path d="M18 150L118 24L226 88L190 206L70 216L18 150Z" stroke="#1F2933" stroke-width="6" stroke-linejoin="round" />
    <path d="M54 172L154 46L262 110L226 228L106 238L54 172Z" stroke="#7A8791" stroke-width="4" stroke-linejoin="round" />
    <path d="M5 112C48 58 116 25 210 14" stroke="#A9B5BE" stroke-width="3" stroke-dasharray="9 9" />
    <path d="M92 252C157 265 224 250 285 204" stroke="#A9B5BE" stroke-width="3" stroke-dasharray="9 9" />

    <g fill="#1F2933">
      <circle cx="18" cy="150" r="10" />
      <circle cx="118" cy="24" r="10" />
      <circle cx="226" cy="88" r="10" />
      <circle cx="190" cy="206" r="10" />
      <circle cx="70" cy="216" r="10" />
    </g>
    <g fill="#7A8791">
      <circle cx="54" cy="172" r="8" />
      <circle cx="154" cy="46" r="8" />
      <circle cx="262" cy="110" r="8" />
      <circle cx="226" cy="228" r="8" />
      <circle cx="106" cy="238" r="8" />
    </g>
  </g>

  <g transform="translate(465 362)" stroke="#5A6872" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0H86" />
    <path d="M64 -22L92 0L64 22" />
  </g>

  <g transform="translate(555 214)">
    <text x="130" y="10" text-anchor="middle" fill="#34414A" font-size="20" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">pre-shape sphere</text>
    <circle cx="130" cy="172" r="140" fill="url(#sphere)" stroke="#A7B4BE" stroke-width="3" />
    <ellipse cx="130" cy="172" rx="88" ry="140" stroke="#C1CCD4" stroke-width="2" />
    <ellipse cx="130" cy="172" rx="140" ry="42" stroke="#C1CCD4" stroke-width="2" />
    <path d="M38 118C89 152 166 156 238 126" stroke="#6C7A84" stroke-width="4" stroke-linecap="round" />
    <path d="M56 236C108 206 174 203 220 232" stroke="#1F2933" stroke-width="5" stroke-linecap="round" />
    <g fill="#1F2933">
      <circle cx="58" cy="236" r="9" />
