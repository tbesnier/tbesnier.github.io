      <circle cx="82" cy="54" r="9" />
      <circle cx="132" cy="86" r="9" />
      <circle cx="116" cy="142" r="9" />
      <circle cx="62" cy="150" r="9" />
    </g>
  </g>

  <g transform="translate(150 588)">
    <rect x="0" y="-28" width="213" height="44" rx="8" fill="#1F2933" />
    <text x="106" y="0" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">center + normalize</text>
    <rect x="232" y="-28" width="196" height="44" rx="8" fill="#52616B" />
    <text x="330" y="0" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">align rotations</text>
    <rect x="447" y="-28" width="164" height="44" rx="8" fill="#8AA0A8" />
    <text x="529" y="0" text-anchor="middle" fill="#12202A" font-size="18" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">measure shape</text>
  </g>
</svg>
